name: Build Forge Mod Java 8

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Baixar o codigo fonte
      uses: actions/checkout@v4

    - name: Configurar o Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Dar permissao de execucao ao Gradle
      run: chmod +x gradlew

    - name: Fix gradle version
      run: sed -i 's/gradle-8.4-bin/gradle-2.14-bin/g' gradle/wrapper/gradle-wrapper.properties

    - name: Copy minecraft jars
      run: |
        mkdir -p ~/.gradle/caches/minecraft/net/minecraft/minecraft/1.7.10
        mkdir -p ~/.gradle/caches/minecraft/net/minecraft/minecraft_server/1.7.10
        cp 1.7.10.jar ~/.gradle/caches/minecraft/net/minecraft/minecraft/1.7.10/minecraft-1.7.10.jar
        cp 1.7.10.jar ~/.gradle/caches/minecraft/net/minecraft/minecraft_server/1.7.10/minecraft_server-1.7.10.jar

    - name: Compilar o Mod com Forge
      run: ./gradlew build -x downloadClient -x downloadServer -x getAssetsIndex -x getAssets

    - name: Disponibilizar o Mod para Download
      uses: actions/upload-artifact@v4
      with:
        name: RenAura-mod
        path: build/libs/*.jar
        retention-days: 14
