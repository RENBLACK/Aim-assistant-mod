name: Build Forge Mod Java 8

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Baixar o codigo fonte
      uses: actions/checkout@v4

    - name: Configurar o Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Dar permissao de execucao ao Gradle
      run: chmod +x gradlew

    - name: Fix gradle version
      run: sed -i 's/gradle-8.4-bin/gradle-4.4.1-all/g' gradle/wrapper/gradle-wrapper.properties

    - name: Compilar o Mod com Forge
      run: ./gradlew build -x test --refresh-dependencies

    - name: Disponibilizar o Mod para Download
      uses: actions/upload-artifact@v4
      with:
        name: RenAura-mod
        path: build/libs/*.jar
        retention-days: 14
